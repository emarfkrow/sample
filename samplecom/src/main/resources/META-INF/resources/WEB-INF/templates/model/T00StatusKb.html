<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{T00StatusKb.title}">決裁フロー</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/T00StatusKb.js}"></script>
<script th:src="@{/model/T00StatusKbGridColumns.js}"></script>
<!-- 決裁フローの参照モデルのグリッド定義 -->
<script th:src="@{/model/MhrUser.js}"></script>
<script th:src="@{/model/MhrUserGridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{T00StatusKb.h2}">h2</h2>
    <form name="T00StatusKbRegistForm" action="T00StatusKbRegist.ajax" class="regist">
      <fieldset>
        <legend th:text="#{T00StatusKb.legend}">legend</legend>
        <div id="flowId">
          <label for="T00StatusKb.flowId" th:text="#{T00StatusKb.flowId}">フローID</label><input type="text" id="T00StatusKb.flowId" name="T00StatusKb.flowId" maxlength="10" class=" primaryKey numbering notblank" />
        </div>
        <div id="tableNm">
          <label for="T00StatusKb.tableNm" th:text="#{T00StatusKb.tableNm}">テーブル名称</label><input type="text" id="T00StatusKb.tableNm" name="T00StatusKb.tableNm" maxlength="20" />
        </div>
        <div id="primaryKeys">
          <label for="T00StatusKb.primaryKeys" th:text="#{T00StatusKb.primaryKeys}">主キー</label><input type="text" id="T00StatusKb.primaryKeys" name="T00StatusKb.primaryKeys" maxlength="300" />
        </div>
        <div id="statusKb">
          <fieldset id="T00StatusKb.statusKbList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:STATUS_KB" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI">
            <legend th:text="#{T00StatusKb.statusKb}">ステータス区分</legend>
          </fieldset>
        </div>
        <div id="kessaiTs">
          <label th:text="#{T00StatusKb.kessaiTs}">決裁タイムスタンプ</label><span id="T00StatusKb.kessaiTs" class=" YmdHmsS"></span><input type="text" id="T00StatusKb.kessaiTs" name="T00StatusKb.kessaiTs" style="display: none;" class=" YmdHmsS" />
        </div>
        <div id="kessaiId">
          <label for="T00StatusKb.kessaiId" th:text="#{T00StatusKb.kessaiId}">決裁者ID</label><input type="text" id="T00StatusKb.kessaiId" name="T00StatusKb.kessaiId" maxlength="10" />
        </div>
        <div id="riyuTx">
          <label for="T00StatusKb.riyuTx" th:text="#{T00StatusKb.riyuTx}">決裁コメント</label>
          <textarea id="T00StatusKb.riyuTx" name="T00StatusKb.riyuTx"></textarea>
        </div>
        <div id="insertTs">
          <label th:text="#{T00StatusKb.insertTs}" class="meta">作成タイムスタンプ</label><span id="T00StatusKb.insertTs" class="meta YmdHmsS"></span><input type="hidden" id="T00StatusKb.insertTs" name="T00StatusKb.insertTs" class="meta" />
        </div>
        <div id="insertUserId">
          <label th:text="#{T00StatusKb.insertUserId}" class="meta">作成者</label><span id="T00StatusKb.insertUserId" class="meta"></span><input type="hidden" id="T00StatusKb.insertUserId" name="T00StatusKb.insertUserId" class="meta" />
          <span id="T00StatusKb.insertUserSei" class="refer meta" data-referFor="T00StatusKb.insertUserId" data-json="MhrUserSearch.json" data-srcDef="USER_ID:T00StatusKb.insertUserId" data-destDef="T00StatusKb.insertUserSei:USER_SEI"></span>
        </div>
        <div id="updateTs">
          <label th:text="#{T00StatusKb.updateTs}" class="meta">更新タイムスタンプ</label><span id="T00StatusKb.updateTs" class="meta YmdHmsS"></span><input type="hidden" id="T00StatusKb.updateTs" name="T00StatusKb.updateTs" class="meta" />
        </div>
        <div id="updateUserId">
          <label th:text="#{T00StatusKb.updateUserId}" class="meta">更新者</label><span id="T00StatusKb.updateUserId" class="meta"></span><input type="hidden" id="T00StatusKb.updateUserId" name="T00StatusKb.updateUserId" class="meta" />
          <span id="T00StatusKb.updateUserSei" class="refer meta" data-referFor="T00StatusKb.updateUserId" data-json="MhrUserSearch.json" data-srcDef="USER_ID:T00StatusKb.updateUserId" data-destDef="T00StatusKb.updateUserSei:USER_SEI"></span>
        </div>
      </fieldset>
      <div class="buttons">
        <a th:href="@{T00StatusKbGet.xlsx(baseMei=#{T00StatusKb.h2})}" id="T00StatusKbGet.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
      </div>
      <div class="submits">
      </div>
    </form>
  </div>
</body>
</html>
