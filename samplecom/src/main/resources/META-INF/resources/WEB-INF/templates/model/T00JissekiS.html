<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{T00JissekiS.title}">T00_JISSEKI</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/T00Jisseki.js}"></script>
<script th:src="@{/model/T00JissekiGridColumns.js}"></script>
<!-- T00_JISSEKIの参照モデルのグリッド定義 -->
<script th:src="@{/model/T00Koutei.js}"></script>
<script th:src="@{/model/T00KouteiGridColumns.js}"></script>
  <!-- T00_KOUTEIの参照モデルのグリッド定義 -->
  <script th:src="@{/model/MhrUser.js}"></script>
  <script th:src="@{/model/MhrUserGridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{T00JissekiS.h2}">h2</h2>
    <!-- 検索フォーム -->
    <form name="T00JissekiSearchForm" action="T00JissekiSearch.ajax" class="search">
      <input type="hidden" name="rows" value="10" />
      <input type="hidden" name="page" value="0" />
      <fieldset>
        <legend th:text="#{T00JissekiS.legend}">legend</legend>
        <div id="kouteiId">
          <label for="T00Jisseki.kouteiId" th:text="#{T00Jisseki.kouteiId}">KOUTEI_ID</label><input type="text" id="T00Jisseki.kouteiId" name="T00Jisseki.kouteiId" maxlength="10" class=" primaryKey refer" data-referFor="T00Jisseki.kouteiId" data-json="T00KouteiSearch.json" data-srcDef="KOUTEI_ID:T00Jisseki.kouteiId" data-destDef="T00Jisseki.kouteiMei:KOUTEI_MEI" /><a id="T00Jisseki.kouteiId" th:href="@{/model/T00KouteiS.html}" target="dialog" class=" primaryKey refer" th:text="#{common.refer}" tabindex="-1">...</a><span id="T00Jisseki.kouteiMei" class=" primaryKey refer" data-referFor="T00Jisseki.kouteiId" data-json="T00KouteiSearch.json" data-srcDef="KOUTEI_ID:T00Jisseki.kouteiId" data-destDef="T00Jisseki.kouteiMei:KOUTEI_MEI"></span>
        </div>
        <div id="jissekiBn">
          <label for="T00Jisseki.jissekiBn" th:text="#{T00Jisseki.jissekiBn}">JISSEKI_BN</label><input type="text" id="T00Jisseki.jissekiBn" name="T00Jisseki.jissekiBn" maxlength="10" class=" primaryKey" />
        </div>
        <div id="jisshiBi">
          <label for="T00Jisseki.jisshiBi_1" th:text="#{T00Jisseki.jisshiBi}">JISSHI_BI</label><input type="text" id="T00Jisseki.jisshiBi_1" name="T00Jisseki.jisshiBi_1" maxlength="10" class=" datepicker" />～<input type="text" id="T00Jisseki.jisshiBi_2" name="T00Jisseki.jisshiBi_2" maxlength="10" class=" datepicker" />
        </div>
        <div id="kanryoBi">
          <label for="T00Jisseki.kanryoBi_1" th:text="#{T00Jisseki.kanryoBi}">KANRYO_BI</label><input type="text" id="T00Jisseki.kanryoBi_1" name="T00Jisseki.kanryoBi_1" maxlength="10" class=" datepicker" />～<input type="text" id="T00Jisseki.kanryoBi_2" name="T00Jisseki.kanryoBi_2" maxlength="10" class=" datepicker" />
        </div>
      </fieldset>
      <div class="buttons">
        <button type="button" id="ResetT00Jisseki" th:text="#{common.reset}" class="reset" onClick="Dialogate.reset(event);">reset</button>
        <a th:href="@{/model/T00Jisseki.html(anew)}" target="dialog" id="T00Jisseki" class="anew" th:text="#{T00Jisseki.add}" tabindex="-1">T00_JISSEKI</a>
      </div>
      <div class="submits">
        <button id="SearchT00Jisseki" type="submit" class="search" data-gridId="T00JissekiGrid" th:text="#{common.search}">search</button>
      </div>
    </form>
    <!-- 一覧フォーム -->
    <form name="T00JissekiSRegistForm" action="T00JissekiSRegist.ajax" class="regist">
      <h3 th:text="#{T00Jisseki.h3}">h3</h3>
      <div id="T00JissekiGrid" data-selectionMode="checkbox" data-addRow="true" data-frozenColumn="1" th:data-href="@{/model/T00Jisseki.html}"></div>
      <div id="T00JissekiPager"></div>
      <div class="buttons">
        <button type="button" class="reset" id="ResetT00JissekiS" th:text="#{common.reset}" onClick="Base.listReset('T00Jisseki');">reset</button>
        <a th:href="@{T00JissekiSearch.xlsx(baseMei=#{T00JissekiS.h2})}" id="T00JissekiSearch.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
        <a id="T00JissekiGrid.kouteiId" th:href="@{/model/T00KouteiS.html}" target="dialog" class="refer" th:text="#{T00KouteiS.title} + #{common.refer}" tabindex="-1" style="display: none;">...</a>
        <button type="submit" id="DeleteT00JissekiS" data-action="T00JissekiSDelete.ajax" class="delete selectRows" th:text="#{common.delete}" tabindex="-1">delete</button>
      </div>
      <div class="submits">
        <button id="RegistT00JissekiS" type="submit" class="regist" th:text="#{common.regist}">regist</button>
      </div>
    </form>
  </div>
</body>
</html>
