<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{T00EntityS.title}">T00_ENTITY</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/T00Entity.js}"></script>
<script th:src="@{/model/T00EntityGridColumns.js}"></script>
<!-- T00_ENTITYの参照モデルのグリッド定義 -->
<script th:src="@{/model/MhrUser.js}"></script>
<script th:src="@{/model/MhrUserGridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{T00EntityS.h2}">h2</h2>
    <!-- 検索フォーム -->
    <form name="T00EntitySearchForm" action="T00EntitySearch.ajax" class="search">
      <input type="hidden" name="rows" value="10" />
      <input type="hidden" name="page" value="0" />
      <fieldset>
        <legend th:text="#{T00EntityS.legend}">legend</legend>
        <div id="entityId">
          <label for="T00Entity.entityId" th:text="#{T00Entity.entityId}">ENTITY_ID</label><input type="text" id="T00Entity.entityId" name="T00Entity.entityId" maxlength="10" class=" primaryKey" />
        </div>
        <div id="entityNm">
          <label for="T00Entity.entityNm" th:text="#{T00Entity.entityNm}">ENTITY_NM</label><input type="text" id="T00Entity.entityNm" name="T00Entity.entityNm" maxlength="20" class="" />
        </div>
        <div id="entityMei">
          <label for="T00Entity.entityMei" th:text="#{T00Entity.entityMei}">ENTITY_MEI</label><input type="text" id="T00Entity.entityMei" name="T00Entity.entityMei" maxlength="60" class="" />
        </div>
        <div id="bitB">
          <label for="T00Entity.bitBF" th:text="#{T00Entity.bitB}">BIT_B</label><input type="text" id="T00Entity.bitBF" name="T00Entity.bitBF" maxlength="10" class=" bit right" />
          <span id="T00Entity.bitB" class=" bit right"></span><input type="hidden" id="T00Entity.bitB" name="T00Entity.bitB" class=" bit right" />
        </div>
        <div id="checkF">
          <fieldset id="T00Entity.checkFList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:CHECK_F" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI">
            <legend th:text="#{T00Entity.checkF}">CHECK_F</legend>
          </fieldset>
        </div>
        <div id="radioKb">
          <fieldset id="T00Entity.radioKbList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:RADIO_KB" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI">
            <legend th:text="#{T00Entity.radioKb}">RADIO_KB</legend>
          </fieldset>
        </div>
        <div id="pulldownKb">
          <fieldset id="T00Entity.pulldownKbList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:PULLDOWN_KB" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI">
            <legend th:text="#{T00Entity.pulldownKb}">PULLDOWN_KB</legend>
          </fieldset>
        </div>
        <div id="pulldownSb">
          <fieldset id="T00Entity.pulldownSbList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:PULLDOWN_SB" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI" data-force-pulldown="1">
            <legend th:text="#{T00Entity.pulldownSb}">PULLDOWN_SB</legend>
          </fieldset>
        </div>
        <div id="memoTx">
          <label for="T00Entity.memoTx" th:text="#{T00Entity.memoTx}">MEMO_TX</label><input type="text" id="T00Entity.memoTx" name="T00Entity.memoTx" maxlength="300" class="" />
        </div>
        <div id="memo">
          <label for="T00Entity.memo" th:text="#{T00Entity.memo}">MEMO</label><input type="text" id="T00Entity.memo" name="T00Entity.memo" maxlength="300" class="" />
        </div>
        <div id="nenY">
          <label for="T00Entity.nenY_1" th:text="#{T00Entity.nenY}">NEN_Y</label><input type="number" id="T00Entity.nenY_1" name="T00Entity.nenY_1" maxlength="4" class="" />～<input type="number" id="T00Entity.nenY_2" name="T00Entity.nenY_2" maxlength="4" class="" />
        </div>
        <div id="tsukiM">
          <label for="T00Entity.tsukiM_1" th:text="#{T00Entity.tsukiM}">TSUKI_M</label><input type="number" id="T00Entity.tsukiM_1" name="T00Entity.tsukiM_1" maxlength="2" class="" />～<input type="number" id="T00Entity.tsukiM_2" name="T00Entity.tsukiM_2" maxlength="2" class="" />
        </div>
        <div id="hiD">
          <label for="T00Entity.hiD_1" th:text="#{T00Entity.hiD}">HI_D</label><input type="number" id="T00Entity.hiD_1" name="T00Entity.hiD_1" maxlength="2" class="" />～<input type="number" id="T00Entity.hiD_2" name="T00Entity.hiD_2" maxlength="2" class="" />
        </div>
        <div id="nengetsuYm">
          <label for="T00Entity.nengetsuYm_1" th:text="#{T00Entity.nengetsuYm}">NENGETSU_YM</label><input type="month" id="T00Entity.nengetsuYm_1" name="T00Entity.nengetsuYm_1" maxlength="6" class="" />～<input type="month" id="T00Entity.nengetsuYm_2" name="T00Entity.nengetsuYm_2" maxlength="6" class="" />
        </div>
        <div id="nengappiYmd">
          <label for="T00Entity.nengappiYmd_1" th:text="#{T00Entity.nengappiYmd}">NENGAPPI_YMD</label><input type="text" id="T00Entity.nengappiYmd_1" name="T00Entity.nengappiYmd_1" maxlength="8" class=" datepicker" data-format="yymmdd" />～<input type="text" id="T00Entity.nengappiYmd_2" name="T00Entity.nengappiYmd_2" maxlength="8" class=" datepicker" data-format="yymmdd" />
        </div>
        <div id="nichijiDt">
          <label for="T00Entity.nichijiDt_1" th:text="#{T00Entity.nichijiDt}">NICHIJI_DT</label><input type="datetime-local" id="T00Entity.nichijiDt_1" name="T00Entity.nichijiDt_1" maxlength="19" class="" />～<input type="datetime-local" id="T00Entity.nichijiDt_2" name="T00Entity.nichijiDt_2" maxlength="19" class="" />
        </div>
        <div id="hidukeBi">
          <label for="T00Entity.hidukeBi_1" th:text="#{T00Entity.hidukeBi}">HIDUKE_BI</label><input type="text" id="T00Entity.hidukeBi_1" name="T00Entity.hidukeBi_1" maxlength="10" class=" datepicker" />～<input type="text" id="T00Entity.hidukeBi_2" name="T00Entity.hidukeBi_2" maxlength="10" class=" datepicker" />
        </div>
        <div id="jikokuHm">
          <label for="T00Entity.jikokuHm_1" th:text="#{T00Entity.jikokuHm}">JIKOKU_HM</label><input type="time" id="T00Entity.jikokuHm_1" name="T00Entity.jikokuHm_1" maxlength="5" class="" />～<input type="time" id="T00Entity.jikokuHm_2" name="T00Entity.jikokuHm_2" maxlength="5" class="" />
        </div>
        <div id="jikanTm">
          <label for="T00Entity.jikanTm_1" th:text="#{T00Entity.jikanTm}">JIKAN_TM</label><input type="text" id="T00Entity.jikanTm_1" name="T00Entity.jikanTm_1" maxlength="9" class=" time" />～<input type="text" id="T00Entity.jikanTm_2" name="T00Entity.jikanTm_2" maxlength="9" class=" time" />
        </div>
        <div id="tsukaKb">
          <fieldset id="T00Entity.tsukaKbList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:TSUKA_KB" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI">
            <legend th:text="#{T00Entity.tsukaKb}">TSUKA_KB</legend>
          </fieldset>
        </div>
        <div id="juchuQt">
          <label for="T00Entity.juchuQt_1" th:text="#{T00Entity.juchuQt}">JUCHU_QT</label><input type="number" id="T00Entity.juchuQt_1" name="T00Entity.juchuQt_1" maxlength="11" class="" />～<input type="number" id="T00Entity.juchuQt_2" name="T00Entity.juchuQt_2" maxlength="11" class="" />
        </div>
        <div id="juchuPr">
          <label for="T00Entity.juchuPr_1" th:text="#{T00Entity.juchuPr}">JUCHU_PR</label><input type="number" id="T00Entity.juchuPr_1" name="T00Entity.juchuPr_1" maxlength="11" class="" />～<input type="number" id="T00Entity.juchuPr_2" name="T00Entity.juchuPr_2" maxlength="11" class="" />
        </div>
        <div id="juchuAm">
          <label for="T00Entity.juchuAm_1" th:text="#{T00Entity.juchuAm}">JUCHU_AM</label><input type="number" id="T00Entity.juchuAm_1" name="T00Entity.juchuAm_1" maxlength="11" class="" />～<input type="number" id="T00Entity.juchuAm_2" name="T00Entity.juchuAm_2" maxlength="11" class="" />
        </div>
        <div id="hacchuQt">
          <label for="T00Entity.hacchuQt_1" th:text="#{T00Entity.hacchuQt}">HACCHU_QT</label><input type="number" id="T00Entity.hacchuQt_1" name="T00Entity.hacchuQt_1" maxlength="11" class="" />～<input type="number" id="T00Entity.hacchuQt_2" name="T00Entity.hacchuQt_2" maxlength="11" class="" />
        </div>
        <div id="hacchuPr">
          <label for="T00Entity.hacchuPr_1" th:text="#{T00Entity.hacchuPr}">HACCHU_PR</label><input type="number" id="T00Entity.hacchuPr_1" name="T00Entity.hacchuPr_1" maxlength="11" class="" />～<input type="number" id="T00Entity.hacchuPr_2" name="T00Entity.hacchuPr_2" maxlength="11" class="" />
        </div>
        <div id="hacchuAm">
          <label for="T00Entity.hacchuAm_1" th:text="#{T00Entity.hacchuAm}">HACCHU_AM</label><input type="number" id="T00Entity.hacchuAm_1" name="T00Entity.hacchuAm_1" maxlength="11" class="" />～<input type="number" id="T00Entity.hacchuAm_2" name="T00Entity.hacchuAm_2" maxlength="11" class="" />
        </div>
        <div id="deleteF">
          <fieldset id="T00Entity.deleteFList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:DELETE_F" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI">
            <legend th:text="#{T00Entity.deleteF}">DELETE_F</legend>
          </fieldset>
        </div>
        <div id="statusKb">
          <fieldset id="T00Entity.statusKbList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:STATUS_KB" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI">
            <legend th:text="#{T00Entity.statusKb}">STATUS_KB</legend>
          </fieldset>
        </div>
      </fieldset>
      <div class="buttons">
        <button type="button" id="ResetT00Entity" th:text="#{common.reset}" class="reset" onClick="Dialogate.reset(event);">reset</button>
        <a th:href="@{/model/T00Entity.html(anew)}" target="dialog" id="T00Entity" class="anew" th:text="#{T00Entity.add}" tabindex="-1">T00_ENTITY</a>
      </div>
      <div class="submits">
        <button id="SearchT00Entity" type="submit" class="search" data-gridId="T00EntityGrid" th:text="#{common.search}">search</button>
      </div>
    </form>
    <!-- 一覧フォーム -->
    <form name="T00EntitySRegistForm" action="T00EntitySRegist.ajax" class="regist">
      <h3 th:text="#{T00Entity.h3}">h3</h3>
      <div id="T00EntityGrid" data-selectionMode="checkbox" data-frozenColumn="0" th:data-href="@{/model/T00Entity.html}"></div>
      <div id="T00EntityPager"></div>
      <div class="buttons">
        <button type="button" class="reset" id="ResetT00EntityS" th:text="#{common.reset}" onClick="Base.listReset('T00Entity');">reset</button>
        <a th:href="@{T00EntitySearch.xlsx(baseMei=#{T00EntityS.h2})}" id="T00EntitySearch.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
        <button type="submit" onclick="if (!Base.kessaiTx(this)) { return false; }" id="PermitT00EntityS" data-action="T00EntitySPermit.ajax" class="permit selectRows" th:text="#{common.permit}" tabindex="-1">permit</button>
        <button type="submit" onclick="if (!Base.kessaiTx(this)) { return false; }" id="ForbidT00EntityS" data-action="T00EntitySForbid.ajax" class="forbid selectRows" th:text="#{common.forbid}" tabindex="-1">forbid</button>
        <button type="submit" onclick="if (!Base.kessaiTx(this)) { return false; }" id="ApplyT00EntityS" data-action="T00EntitySApply.ajax" class="apply selectRows" th:text="#{common.apply}" tabindex="-1">apply</button>
        <button type="submit" onclick="if (!Base.kessaiTx(this)) { return false; }" id="CancelT00EntityS" data-action="T00EntitySCancel.ajax" class="cancel selectRows" th:text="#{common.cancel}" tabindex="-1">cancel</button>
      </div>
      <div class="submits">
        <button id="RegistT00EntityS" type="submit" class="regist" th:text="#{common.regist}">regist</button>
      </div>
    </form>
  </div>
</body>
</html>
