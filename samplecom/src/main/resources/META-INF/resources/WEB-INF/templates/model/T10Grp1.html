<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{T10Grp1.title}">T10_GRP1</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/T10Grp1.js}"></script>
<script th:src="@{/model/T10Grp1GridColumns.js}"></script>
<!-- T10_GRP1の参照モデルのグリッド定義 -->
<script th:src="@{/model/MhrUser.js}"></script>
<script th:src="@{/model/MhrUserGridColumns.js}"></script>
<!-- T10_GRP1の集約先モデルのグリッド定義 -->
<script th:src="@{/model/T10Sum.js}"></script>
<script th:src="@{/model/T10SumGridColumns.js}"></script>
  <!-- T10_SUMの集約元モデルのグリッド定義 -->
  <script th:src="@{/model/T10Grp2.js}"></script>
  <script th:src="@{/model/T10Grp2GridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{T10Grp1.h2}">h2</h2>
    <form name="T10Grp1RegistForm" action="T10Grp1Regist.ajax" class="regist">
      <fieldset>
        <legend th:text="#{T10Grp1.legend}">legend</legend>
        <div id="grp1Id">
          <label for="T10Grp1.grp1Id" th:text="#{T10Grp1.grp1Id}">GRP1_ID</label><input type="text" id="T10Grp1.grp1Id" name="T10Grp1.grp1Id" maxlength="10" class=" primaryKey numbering notblank" />
        </div>
        <div id="sumId">
          <label th:text="#{T10Grp1.sumId}">SUM_ID</label><span id="T10Grp1.sumId" class="summary"></span><input type="text" id="T10Grp1.sumId" name="T10Grp1.sumId" style="display: none;" class="summary" />
        </div>
        <div id="insertTs">
          <label th:text="#{T10Grp1.insertTs}" class="meta">INSERT_TS</label><span id="T10Grp1.insertTs" class="meta YmdHmsS"></span><input type="hidden" id="T10Grp1.insertTs" name="T10Grp1.insertTs" class="meta" />
        </div>
        <div id="insertUserId">
          <label th:text="#{T10Grp1.insertUserId}" class="meta">INSERT_USER_ID</label><span id="T10Grp1.insertUserId" class="meta"></span><input type="hidden" id="T10Grp1.insertUserId" name="T10Grp1.insertUserId" class="meta" />
          <span id="T10Grp1.insertUserSei" class="refer meta" data-referFor="T10Grp1.insertUserId" data-json="MhrUserSearch.json" data-srcDef="USER_ID:T10Grp1.insertUserId" data-destDef="T10Grp1.insertUserSei:USER_SEI"></span>
        </div>
        <div id="updateTs">
          <label th:text="#{T10Grp1.updateTs}" class="meta">UPDATE_TS</label><span id="T10Grp1.updateTs" class="meta YmdHmsS"></span><input type="hidden" id="T10Grp1.updateTs" name="T10Grp1.updateTs" class="meta" />
        </div>
        <div id="updateUserId">
          <label th:text="#{T10Grp1.updateUserId}" class="meta">UPDATE_USER_ID</label><span id="T10Grp1.updateUserId" class="meta"></span><input type="hidden" id="T10Grp1.updateUserId" name="T10Grp1.updateUserId" class="meta" />
          <span id="T10Grp1.updateUserSei" class="refer meta" data-referFor="T10Grp1.updateUserId" data-json="MhrUserSearch.json" data-srcDef="USER_ID:T10Grp1.updateUserId" data-destDef="T10Grp1.updateUserSei:USER_SEI"></span>
        </div>
      </fieldset>
      <div class="buttons">
        <button type="button" id="RefreshT10Grp1" th:text="#{common.reset}" class="reset" onClick="Dialogate.refresh(event);">reset</button>
        <a th:href="@{T10Grp1Get.xlsx(baseMei=#{T10Grp1.h2})}" id="T10Grp1Get.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
      </div>
      <div class="submits">
        <button id="DeleteT10Grp1" type="submit" class="delete" data-action="T10Grp1Delete.ajax" th:text="#{common.delete}" tabindex="-1">delete</button>
        <button id="RegistT10Grp1" type="submit" class="regist" th:text="#{common.regist}">regist</button>
      </div>
    </form>
  </div>
</body>
</html>
