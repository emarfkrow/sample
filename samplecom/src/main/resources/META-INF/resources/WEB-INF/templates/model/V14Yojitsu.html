<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{V14Yojitsu.title}">V14_YOJITSU</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/V14Yojitsu.js}"></script>
<script th:src="@{/model/V14YojitsuGridColumns.js}"></script>
<!-- V14_YOJITSUの参照モデルのグリッド定義 -->
<script th:src="@{/model/T14Koutei.js}"></script>
<script th:src="@{/model/T14KouteiGridColumns.js}"></script>
  <!-- T14_KOUTEIの参照モデルのグリッド定義 -->
  <script th:src="@{/model/MhrUser.js}"></script>
  <script th:src="@{/model/MhrUserGridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{V14Yojitsu.h2}">h2</h2>
    <form name="V14YojitsuRegistForm" action="V14YojitsuRegist.ajax" class="regist">
      <fieldset class="view">
        <legend th:text="#{V14Yojitsu.legend}">legend</legend>
        <div id="kouteiId">
          <label for="V14Yojitsu.kouteiId" th:text="#{V14Yojitsu.kouteiId}">KOUTEI_ID</label><input type="text" id="V14Yojitsu.kouteiId" name="V14Yojitsu.kouteiId" maxlength="10" class=" primaryKey refer notblank" />
        </div>
        <div id="kouteiTx">
          <label for="V14Yojitsu.kouteiTx" th:text="#{V14Yojitsu.kouteiTx}">KOUTEI_TX</label>
          <textarea id="V14Yojitsu.kouteiTx" name="V14Yojitsu.kouteiTx" class=" notblank"></textarea>
        </div>
        <div id="kaishiBi">
          <label for="V14Yojitsu.kaishiBi" th:text="#{V14Yojitsu.kaishiBi}">KAISHI_BI</label><input type="text" id="V14Yojitsu.kaishiBi" name="V14Yojitsu.kaishiBi" maxlength="10" class=" notblank datepicker" />
        </div>
        <div id="shuryoBi">
          <label for="V14Yojitsu.shuryoBi" th:text="#{V14Yojitsu.shuryoBi}">SHURYO_BI</label><input type="text" id="V14Yojitsu.shuryoBi" name="V14Yojitsu.shuryoBi" maxlength="10" class=" notblank datepicker" />
        </div>
        <div id="sagyokuCd">
          <label for="V14Yojitsu.sagyokuCd" th:text="#{V14Yojitsu.sagyokuCd}">SAGYOKU_CD</label><input type="text" id="V14Yojitsu.sagyokuCd" name="V14Yojitsu.sagyokuCd" maxlength="10" class=" notblank" />
        </div>
        <div id="oyaKouteiId">
          <label for="V14Yojitsu.oyaKouteiId" th:text="#{V14Yojitsu.oyaKouteiId}">OYA_KOUTEI_ID</label><input type="text" id="V14Yojitsu.oyaKouteiId" name="V14Yojitsu.oyaKouteiId" maxlength="10" class=" refer" />
        </div>
        <div id="jisshiBi">
          <label for="V14Yojitsu.jisshiBi" th:text="#{V14Yojitsu.jisshiBi}">JISSHI_BI</label><input type="text" id="V14Yojitsu.jisshiBi" name="V14Yojitsu.jisshiBi" maxlength="10" class=" datepicker" />
        </div>
        <div id="kanryoBi">
          <label for="V14Yojitsu.kanryoBi" th:text="#{V14Yojitsu.kanryoBi}">KANRYO_BI</label><input type="text" id="V14Yojitsu.kanryoBi" name="V14Yojitsu.kanryoBi" maxlength="10" class=" datepicker" />
        </div>
      </fieldset>
      <div class="buttons">
        <a th:href="@{V14YojitsuGet.xlsx(baseMei=#{V14Yojitsu.h2})}" id="V14YojitsuGet.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
      </div>
      <div class="submits">
      </div>
    </form>
  </div>
</body>
</html>
