<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{T00StatusKbS.title}">決裁フロー</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/T00StatusKb.js}"></script>
<script th:src="@{/model/T00StatusKbGridColumns.js}"></script>
<!-- 決裁フローの参照モデルのグリッド定義 -->
<script th:src="@{/model/MhrUser.js}"></script>
<script th:src="@{/model/MhrUserGridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{T00StatusKbS.h2}">h2</h2>
    <!-- 検索フォーム -->
    <form name="T00StatusKbSearchForm" action="T00StatusKbSearch.ajax" class="search">
      <input type="hidden" name="rows" value="10" />
      <input type="hidden" name="page" value="0" />
      <fieldset>
        <legend th:text="#{T00StatusKbS.legend}">legend</legend>
        <div id="flowId">
          <label for="T00StatusKb.flowId" th:text="#{T00StatusKb.flowId}">フローID</label><input type="text" id="T00StatusKb.flowId" name="T00StatusKb.flowId" maxlength="10" class=" primaryKey" />
        </div>
        <div id="tableNm">
          <label for="T00StatusKb.tableNm" th:text="#{T00StatusKb.tableNm}">テーブル名称</label><input type="text" id="T00StatusKb.tableNm" name="T00StatusKb.tableNm" maxlength="20" />
        </div>
        <div id="primaryKeys">
          <label for="T00StatusKb.primaryKeys" th:text="#{T00StatusKb.primaryKeys}">主キー</label><input type="text" id="T00StatusKb.primaryKeys" name="T00StatusKb.primaryKeys" maxlength="300" />
        </div>
        <div id="statusKb">
          <fieldset id="T00StatusKb.statusKbList" data-options="MsyKbnValSearch.json" data-optionParams="KBN_NM:STATUS_KB" data-optionValue="KBN_VAL" data-optionLabel="KBN_VAL_MEI">
            <legend th:text="#{T00StatusKb.statusKb}">ステータス区分</legend>
          </fieldset>
        </div>
        <div id="kessaiId">
          <label for="T00StatusKb.kessaiId" th:text="#{T00StatusKb.kessaiId}">決裁者ID</label><input type="text" id="T00StatusKb.kessaiId" name="T00StatusKb.kessaiId" maxlength="10" />
        </div>
        <div id="riyuTx">
          <label for="T00StatusKb.riyuTx" th:text="#{T00StatusKb.riyuTx}">決裁コメント</label><input type="text" id="T00StatusKb.riyuTx" name="T00StatusKb.riyuTx" maxlength="300" />
        </div>
      </fieldset>
      <div class="buttons">
        <button type="button" id="ResetT00StatusKb" th:text="#{common.reset}" class="reset" onClick="Dialogate.reset(event);">reset</button>
      </div>
      <div class="submits">
        <button id="SearchT00StatusKb" type="submit" class="search" data-gridId="T00StatusKbGrid" th:text="#{common.search}">submit</button>
      </div>
    </form>
    <!-- 一覧フォーム -->
    <form name="T00StatusKbSRegistForm" action="T00StatusKbSRegist.ajax" class="regist">
      <h3 th:text="#{T00StatusKb.h3}">h3</h3>
      <div id="T00StatusKbGrid" data-selectionMode="checkbox" data-frozenColumn="0" data-editable="false" th:data-href="@{/model/T00StatusKb.html}"></div>
      <div id="T00StatusKbPager"></div>
      <div class="buttons">
        <a th:href="@{T00StatusKbSearch.xlsx(baseMei=#{T00StatusKbS.h2})}" id="T00StatusKbSearch.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
      </div>
      <div class="submits">
      </div>
    </form>
  </div>
</body>
</html>
