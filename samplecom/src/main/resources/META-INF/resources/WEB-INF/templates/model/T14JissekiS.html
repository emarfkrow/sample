<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{T14JissekiS.title}">T14_JISSEKI</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/T14Jisseki.js}"></script>
<script th:src="@{/model/T14JissekiGridColumns.js}"></script>
<!-- T14_JISSEKIの参照モデルのグリッド定義 -->
<script th:src="@{/model/T14Koutei.js}"></script>
<script th:src="@{/model/T14KouteiGridColumns.js}"></script>
  <!-- T14_KOUTEIの参照モデルのグリッド定義 -->
  <script th:src="@{/model/MhrUser.js}"></script>
  <script th:src="@{/model/MhrUserGridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{T14JissekiS.h2}">h2</h2>
    <!-- 検索フォーム -->
    <form name="T14JissekiSearchForm" action="T14JissekiSearch.ajax" class="search">
      <input type="hidden" name="rows" value="10" />
      <input type="hidden" name="page" value="0" />
      <fieldset>
        <legend th:text="#{T14JissekiS.legend}">legend</legend>
        <div id="kouteiId">
          <label for="T14Jisseki.kouteiId" th:text="#{T14Jisseki.kouteiId}">KOUTEI_ID</label><input type="text" id="T14Jisseki.kouteiId" name="T14Jisseki.kouteiId" maxlength="10" class=" primaryKey refer" data-referFor="T14Jisseki.kouteiId" data-json="T14KouteiSearch.json" data-srcDef="KOUTEI_ID:T14Jisseki.kouteiId" data-destDef="T14Jisseki.kouteiMei:KOUTEI_MEI" /><a id="T14Jisseki.kouteiId" th:href="@{/model/T14KouteiS.html}" target="dialog" class=" primaryKey refer" th:text="#{common.refer}" tabindex="-1">...</a><span id="T14Jisseki.kouteiMei" class=" primaryKey refer" data-referFor="T14Jisseki.kouteiId" data-json="T14KouteiSearch.json" data-srcDef="KOUTEI_ID:T14Jisseki.kouteiId" data-destDef="T14Jisseki.kouteiMei:KOUTEI_MEI"></span>
        </div>
        <div id="jissekiBn">
          <label for="T14Jisseki.jissekiBn" th:text="#{T14Jisseki.jissekiBn}">JISSEKI_BN</label><input type="text" id="T14Jisseki.jissekiBn" name="T14Jisseki.jissekiBn" maxlength="10" class=" primaryKey" />
        </div>
        <div id="jisshiBi">
          <label for="T14Jisseki.jisshiBi_1" th:text="#{T14Jisseki.jisshiBi}">JISSHI_BI</label><input type="text" id="T14Jisseki.jisshiBi_1" name="T14Jisseki.jisshiBi_1" maxlength="10" class=" datepicker" />～<input type="text" id="T14Jisseki.jisshiBi_2" name="T14Jisseki.jisshiBi_2" maxlength="10" class=" datepicker" />
        </div>
        <div id="kanryoBi">
          <label for="T14Jisseki.kanryoBi_1" th:text="#{T14Jisseki.kanryoBi}">KANRYO_BI</label><input type="text" id="T14Jisseki.kanryoBi_1" name="T14Jisseki.kanryoBi_1" maxlength="10" class=" datepicker" />～<input type="text" id="T14Jisseki.kanryoBi_2" name="T14Jisseki.kanryoBi_2" maxlength="10" class=" datepicker" />
        </div>
      </fieldset>
      <div class="buttons">
        <button type="button" id="ResetT14Jisseki" th:text="#{common.reset}" class="reset" onClick="Dialogate.reset(event);">reset</button>
        <a th:href="@{/model/T14Jisseki.html(anew)}" target="dialog" id="T14Jisseki" class="anew" th:text="#{T14Jisseki.add}" tabindex="-1">T14_JISSEKI</a>
      </div>
      <div class="submits">
        <button id="SearchT14Jisseki" type="submit" class="search" data-gridId="T14JissekiGrid" th:text="#{common.search}">search</button>
      </div>
    </form>
    <!-- 一覧フォーム -->
    <form name="T14JissekiSRegistForm" action="T14JissekiSRegist.ajax" class="regist">
      <h3 th:text="#{T14Jisseki.h3}">h3</h3>
      <div id="T14JissekiGrid" data-selectionMode="checkbox" data-addRow="true" data-frozenColumn="1" th:data-href="@{/model/T14Jisseki.html}"></div>
      <div id="T14JissekiPager"></div>
      <div class="buttons">
        <button type="button" class="reset" id="ResetT14JissekiS" th:text="#{common.reset}" onClick="Base.listReset('T14Jisseki');">reset</button>
        <a th:href="@{T14JissekiSearch.xlsx(baseMei=#{T14JissekiS.h2})}" id="T14JissekiSearch.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
        <a id="T14JissekiGrid.kouteiId" th:href="@{/model/T14KouteiS.html}" target="dialog" class="refer" th:text="#{T14KouteiS.title} + #{common.refer}" tabindex="-1" style="display: none;">...</a>
        <button type="submit" id="DeleteT14JissekiS" data-action="T14JissekiSDelete.ajax" class="delete selectRows" th:text="#{common.delete}" tabindex="-1">delete</button>
      </div>
      <div class="submits">
        <button id="RegistT14JissekiS" type="submit" class="regist" th:text="#{common.regist}">regist</button>
      </div>
    </form>
  </div>
</body>
</html>
