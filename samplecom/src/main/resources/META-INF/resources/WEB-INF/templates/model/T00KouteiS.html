<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{T00KouteiS.title}">T00_KOUTEI</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/T00Koutei.js}"></script>
<script th:src="@{/model/T00KouteiGridColumns.js}"></script>
<!-- T00_KOUTEIの参照モデルのグリッド定義 -->
<script th:src="@{/model/MhrUser.js}"></script>
<script th:src="@{/model/MhrUserGridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{T00KouteiS.h2}">h2</h2>
    <!-- 検索フォーム -->
    <form name="T00KouteiSearchForm" action="T00KouteiSearch.ajax" class="search">
      <input type="hidden" name="rows" value="10" />
      <input type="hidden" name="page" value="0" />
      <fieldset>
        <legend th:text="#{T00KouteiS.legend}">legend</legend>
        <div id="kouteiId">
          <label for="T00Koutei.kouteiId" th:text="#{T00Koutei.kouteiId}">KOUTEI_ID</label><input type="text" id="T00Koutei.kouteiId" name="T00Koutei.kouteiId" maxlength="10" class=" primaryKey" />
        </div>
        <div id="kouteiMei">
          <label for="T00Koutei.kouteiMei" th:text="#{T00Koutei.kouteiMei}">KOUTEI_MEI</label><input type="text" id="T00Koutei.kouteiMei" name="T00Koutei.kouteiMei" maxlength="60" class="" />
        </div>
        <div id="kaishiBi">
          <label for="T00Koutei.kaishiBi_1" th:text="#{T00Koutei.kaishiBi}">KAISHI_BI</label><input type="text" id="T00Koutei.kaishiBi_1" name="T00Koutei.kaishiBi_1" maxlength="10" class=" datepicker" />～<input type="text" id="T00Koutei.kaishiBi_2" name="T00Koutei.kaishiBi_2" maxlength="10" class=" datepicker" />
        </div>
        <div id="shuryoBi">
          <label for="T00Koutei.shuryoBi_1" th:text="#{T00Koutei.shuryoBi}">SHURYO_BI</label><input type="text" id="T00Koutei.shuryoBi_1" name="T00Koutei.shuryoBi_1" maxlength="10" class=" datepicker" />～<input type="text" id="T00Koutei.shuryoBi_2" name="T00Koutei.shuryoBi_2" maxlength="10" class=" datepicker" />
        </div>
        <div id="oyaKouteiId">
          <label for="T00Koutei.oyaKouteiId" th:text="#{T00Koutei.oyaKouteiId}">OYA_KOUTEI_ID</label><input type="text" id="T00Koutei.oyaKouteiId" name="T00Koutei.oyaKouteiId" maxlength="10" class=" refer" data-referFor="T00Koutei.oyaKouteiId" data-json="T00KouteiSearch.json" data-srcDef="KOUTEI_ID:T00Koutei.oyaKouteiId" data-destDef="T00Koutei.oyaKouteiMei:KOUTEI_MEI" /><a id="T00Koutei.oyaKouteiId" th:href="@{/model/T00KouteiS.html}" target="dialog" class=" refer" th:text="#{common.refer}" tabindex="-1">...</a><span id="T00Koutei.oyaKouteiMei" class=" refer" data-referFor="T00Koutei.oyaKouteiId" data-json="T00KouteiSearch.json" data-srcDef="KOUTEI_ID:T00Koutei.oyaKouteiId" data-destDef="T00Koutei.oyaKouteiMei:KOUTEI_MEI"></span>
        </div>
      </fieldset>
      <div class="buttons">
        <button type="button" id="ResetT00Koutei" th:text="#{common.reset}" class="reset" onClick="Dialogate.reset(event);">reset</button>
        <a th:href="@{/model/T00Koutei.html(anew)}" target="dialog" id="T00Koutei" class="anew" th:text="#{T00Koutei.add}" tabindex="-1">T00_KOUTEI</a>
      </div>
      <div class="submits">
        <button id="SearchT00Koutei" type="submit" class="search" data-gridId="T00KouteiGrid" th:text="#{common.search}">search</button>
      </div>
    </form>
    <!-- 一覧フォーム -->
    <form name="T00KouteiSRegistForm" action="T00KouteiSRegist.ajax" class="regist">
      <h3 th:text="#{T00Koutei.h3}">h3</h3>
      <div id="T00KouteiGrid" data-selectionMode="checkbox" data-addRow="true" data-frozenColumn="0" th:data-href="@{/model/T00Koutei.html}"></div>
      <div id="T00KouteiPager"></div>
      <div class="buttons">
        <button type="button" class="reset" id="ResetT00KouteiS" th:text="#{common.reset}" onClick="Base.listReset('T00Koutei');">reset</button>
        <a th:href="@{T00KouteiSearch.xlsx(baseMei=#{T00KouteiS.h2})}" id="T00KouteiSearch.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
        <a id="T00KouteiGrid.oyaKouteiId" th:href="@{/model/T00KouteiS.html}" target="dialog" class="refer" th:text="#{T00KouteiS.title} + #{common.refer}" tabindex="-1" style="display: none;">...</a>
        <button type="submit" id="DeleteT00KouteiS" data-action="T00KouteiSDelete.ajax" class="delete selectRows" th:text="#{common.delete}" tabindex="-1">delete</button>
      </div>
      <div class="submits">
        <button id="RegistT00KouteiS" type="submit" class="regist" th:text="#{common.regist}">regist</button>
      </div>
    </form>
  </div>
</body>
</html>
