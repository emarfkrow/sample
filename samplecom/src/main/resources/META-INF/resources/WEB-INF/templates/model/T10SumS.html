<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{T10SumS.title}">T10_SUM</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/T10Sum.js}"></script>
<script th:src="@{/model/T10SumGridColumns.js}"></script>
<!-- T10_SUMの参照モデルのグリッド定義 -->
<script th:src="@{/model/MhrUser.js}"></script>
<script th:src="@{/model/MhrUserGridColumns.js}"></script>
<!-- T10_SUMの集約元モデルのグリッド定義 -->
<script th:src="@{/model/T10Grp1.js}"></script>
<script th:src="@{/model/T10Grp1GridColumns.js}"></script>
    <!-- T10_SUMの集約元モデルのグリッド定義 -->
    <script th:src="@{/model/T10Grp2.js}"></script>
    <script th:src="@{/model/T10Grp2GridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{T10SumS.h2}">h2</h2>
    <!-- 検索フォーム -->
    <form name="T10SumSearchForm" action="T10SumSearch.ajax" class="search">
      <input type="hidden" name="rows" value="10" />
      <input type="hidden" name="page" value="0" />
      <fieldset>
        <legend th:text="#{T10SumS.legend}">legend</legend>
        <div id="sumId">
          <label for="T10Sum.sumId" th:text="#{T10Sum.sumId}">SUM_ID</label><input type="text" id="T10Sum.sumId" name="T10Sum.sumId" maxlength="10" class=" primaryKey" />
        </div>
        <div id="sumInfo">
          <label for="T10Sum.sumInfo" th:text="#{T10Sum.sumInfo}">SUM_INFO</label><input type="text" id="T10Sum.sumInfo" name="T10Sum.sumInfo" maxlength="300" class="" />
        </div>
      </fieldset>
      <div class="buttons">
        <button type="button" id="ResetT10Sum" th:text="#{common.reset}" class="reset" onClick="Dialogate.reset(event);">reset</button>
        <a th:href="@{/model/T10Sum.html(anew)}" target="dialog" id="T10Sum" class="anew" th:text="#{T10Sum.add}" tabindex="-1">T10_SUM</a>
      </div>
      <div class="submits">
        <button id="SearchT10Sum" type="submit" class="search" data-gridId="T10SumGrid" th:text="#{common.search}">search</button>
      </div>
    </form>
    <!-- 一覧フォーム -->
    <form name="T10SumSRegistForm" action="T10SumSRegist.ajax" class="regist">
      <h3 th:text="#{T10Sum.h3}">h3</h3>
      <div id="T10SumGrid" data-selectionMode="checkbox" data-addRow="true" data-frozenColumn="0" th:data-href="@{/model/T10Sum.html}"></div>
      <div id="T10SumPager"></div>
      <div class="buttons">
        <button type="button" class="reset" id="ResetT10SumS" th:text="#{common.reset}" onClick="Base.listReset('T10Sum');">reset</button>
        <a th:href="@{T10SumSearch.xlsx(baseMei=#{T10SumS.h2})}" id="T10SumSearch.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
        <button type="submit" id="DeleteT10SumS" data-action="T10SumSDelete.ajax" class="delete selectRows" th:text="#{common.delete}" tabindex="-1">delete</button>
      </div>
      <div class="submits">
        <button id="RegistT10SumS" type="submit" class="regist" th:text="#{common.regist}">regist</button>
      </div>
    </form>
  </div>
</body>
</html>
