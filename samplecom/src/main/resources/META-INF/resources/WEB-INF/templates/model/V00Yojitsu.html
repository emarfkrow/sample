<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout" layout:decorate="~{common/base}">
<head>
<meta charset="UTF-8">
<title th:text="#{V00Yojitsu.title}">V00_YOJITSU</title>
<style type="text/css">
</style>
<script type="text/javascript">

</script>
<script th:src="@{/model/V00Yojitsu.js}"></script>
<script th:src="@{/model/V00YojitsuGridColumns.js}"></script>
<!-- VIEWの参照モデルのグリッド定義 -->
<script th:src="@{/model/T00Koutei.js}"></script>
<script th:src="@{/model/T00KouteiGridColumns.js}"></script>
  <!-- 工程の参照モデルのグリッド定義 -->
  <script th:src="@{/model/MhrUser.js}"></script>
  <script th:src="@{/model/MhrUserGridColumns.js}"></script>
</head>
<body>
  <div layout:fragment="article">
    <h2 th:text="#{V00Yojitsu.h2}">h2</h2>
    <form name="V00YojitsuRegistForm" action="V00YojitsuRegist.ajax" class="regist">
      <fieldset class="view">
        <legend th:text="#{V00Yojitsu.legend}">legend</legend>
        <div id="kouteiId">
          <label for="V00Yojitsu.kouteiId" th:text="#{V00Yojitsu.kouteiId}">KOUTEI_ID</label><input type="text" id="V00Yojitsu.kouteiId" name="V00Yojitsu.kouteiId" maxlength="10" class=" primaryKey refer notblank" />
        </div>
        <div id="kouteiTx">
          <label for="V00Yojitsu.kouteiTx" th:text="#{V00Yojitsu.kouteiTx}">KOUTEI_TX</label>
          <textarea id="V00Yojitsu.kouteiTx" name="V00Yojitsu.kouteiTx" class=" notblank"></textarea>
        </div>
        <div id="kaishiBi">
          <label for="V00Yojitsu.kaishiBi" th:text="#{V00Yojitsu.kaishiBi}">KAISHI_BI</label><input type="text" id="V00Yojitsu.kaishiBi" name="V00Yojitsu.kaishiBi" maxlength="10" class=" notblank datepicker" />
        </div>
        <div id="shuryoBi">
          <label for="V00Yojitsu.shuryoBi" th:text="#{V00Yojitsu.shuryoBi}">SHURYO_BI</label><input type="text" id="V00Yojitsu.shuryoBi" name="V00Yojitsu.shuryoBi" maxlength="10" class=" notblank datepicker" />
        </div>
        <div id="oyaKouteiId">
          <label for="V00Yojitsu.oyaKouteiId" th:text="#{V00Yojitsu.oyaKouteiId}">OYA_KOUTEI_ID</label><input type="text" id="V00Yojitsu.oyaKouteiId" name="V00Yojitsu.oyaKouteiId" maxlength="10" class=" refer" />
        </div>
        <div id="jisshiBi">
          <label for="V00Yojitsu.jisshiBi" th:text="#{V00Yojitsu.jisshiBi}">JISSHI_BI</label><input type="text" id="V00Yojitsu.jisshiBi" name="V00Yojitsu.jisshiBi" maxlength="10" class=" datepicker" />
        </div>
        <div id="kanryoBi">
          <label for="V00Yojitsu.kanryoBi" th:text="#{V00Yojitsu.kanryoBi}">KANRYO_BI</label><input type="text" id="V00Yojitsu.kanryoBi" name="V00Yojitsu.kanryoBi" maxlength="10" class=" datepicker" />
        </div>
      </fieldset>
      <div class="buttons">
        <a th:href="@{V00YojitsuGet.xlsx(baseMei=#{V00Yojitsu.h2})}" id="V00YojitsuGet.xlsx" th:text="#{common.xlsx}" class="output" tabindex="-1">xlsx</a>
      </div>
      <div class="submits">
      </div>
    </form>
  </div>
</body>
</html>
